{% extends 'base.html' %}
{% block title %}{{ t('login') }}{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-visual card">
        <div class="mini-slider" id="authSlider">
            <div class="mini-slide active"><img src="{{ url_for('static', filename='images/banner_handshake.png') }}" alt="Handshake banner"></div>
            <div class="mini-slide"><img src="{{ url_for('static', filename='images/banner_hug.png') }}" alt="Community banner"></div>
        </div>
        <div class="auth-copy">
            <h2>{{ t('welcome_back') }}</h2>
            <p>{{ t('login_subtitle') }}</p>
        </div>
    </div>

    <section class="form-card card narrow auth-form premium-form">
        <div class="form-heading compact-heading">
            <span class="form-icon"><i class="fa-solid fa-right-to-bracket"></i></span>
            <div>
                <h1>{{ t('login') }}</h1>
                <p>{{ t('login_form_text') }}</p>
            </div>
        </div>

        <form method="post" class="form-grid single-column">
            <label>{{ t('email') }}
                <input type="email" name="email" required>
            </label>

            <label>{{ t('password') }}
                <input type="password" name="password" required>
            </label>

            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-right-to-bracket"></i> {{ t('login') }}</button>
        </form>

        <p class="auth-note">{{ t('new_here') }} <a href="{{ url_for('register') }}">{{ t('create_account') }}</a></p>
    </section>
</section>
{% endblock %}

{% block scripts %}
<script>
(() => {
  const slides = document.querySelectorAll('.mini-slide');
  let current = 0;
  setInterval(() => {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
  }, 4200);
})();
</script>
{% endblock %}
