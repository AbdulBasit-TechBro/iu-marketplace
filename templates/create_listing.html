{% extends 'base.html' %}
{% block title %}{{ t('create_listing') }}{% endblock %}

{% block content %}
<section class="form-card card medium premium-form">
    <div class="form-heading">
        <span class="form-icon"><i class="fa-solid fa-circle-plus"></i></span>
        <div>
            <h1>{{ t('post_new_listing') }}</h1>
            <p>{{ t('post_new_listing_subtitle') }}</p>
        </div>
    </div>

    <form method="post" enctype="multipart/form-data" class="form-grid">
        <label>{{ t('item_title') }}
            <input type="text" name="title" required>
        </label>

        <label>{{ t('listing_type') }}
            <select name="listing_type" required>
                <option value="buy">{{ t('sell') }}</option>
                <option value="gift">{{ t('gift') }}</option>
            </select>
        </label>

        <label>{{ t('price_sell') }}
            <input type="number" step="0.01" min="0" name="price">
        </label>

        <label>{{ t('item_image') }}
            <input type="file" name="image" accept="image/*">
        </label>

        <label class="span-2">{{ t('description') }}
            <textarea name="description" rows="6" required></textarea>
        </label>

        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-upload"></i> {{ t('create_listing') }}</button>
    </form>
</section>
{% endblock %}
